<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shubham Kingspan Rhino Tanks — Experience Center</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>

  <div id="loader">
    <div class="loader-ring"></div>
    <div class="loader-ring loader-ring--2"></div>
    <div class="loader-text">INITIALIZING<span class="loader-dots">...</span></div>
  </div>

  <div class="bg-grid"></div>
  <div class="bg-vignette"></div>
  <canvas id="particle-canvas"></canvas>

  <header id="site-header">
    <div class="header-left">
      <h1 class="company-name">SHUBHAM TANKS AND LINERS PVT. LTD.</h1>
    </div>

    <!-- ADDED: Tank type toggle (top-right) -->
    <div class="tank-toggle" id="tank-toggle">
      <button class="toggle-btn active" data-tank="RCT">RCT</button>
      <button class="toggle-btn" data-tank="SST">SST</button>
      <button class="toggle-btn" data-tank="FM">FM</button>
    </div>

  </header>

  <main id="stage">
    <div id="tank-wrapper">
      <!-- src switched dynamically -->
      <img id="tank-image" src="assets/Hitech, Gujrat.jpg" alt="Rhino Tank" draggable="false" />
      <div id="tank-glow"></div>
      <!-- hotspots injected here by renderHotspots() -->
    </div>
  </main>

  <aside id="detail-panel">
    <button id="panel-close" aria-label="Close panel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div class="panel-inner">
      <div class="panel-tag" id="panel-tag">COMPONENT</div>
      <h2 class="panel-title" id="panel-title">—</h2>
      <div class="panel-image-wrap">
        <img id="panel-image" src="" alt="" />
        <div class="panel-image-overlay"></div>
      </div>
      <div class="panel-description" id="panel-description"></div>
      <div class="panel-specs" id="panel-specs"></div>
    </div>
  </aside>

  <footer id="bottom-bar">
    <span>SELECT A COMPONENT TO EXPLORE</span>
    <!-- shown/hidden per tank -->
    <button class="liner-btn" id="liner-trigger">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M8 12a4 4 0 0 0 8 0 4 4 0 0 0-8 0"/>
      </svg>
      INFINITY LINER
    </button>
  </footer>

  <div id="fs-overlay" style="display:none;">
    <div class="fs-content">
      <button id="fs-back" onclick="closePanel()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </button>
      <img id="overlay-image" class="fs-animate fs-image" src="" alt="" />
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
